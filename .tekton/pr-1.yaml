---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pull-pr-1
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: |
      (event == "pull_request" || event == "push") && target_branch == "main"
spec:
  params:
    - name: pull_request_number
      value: "{{ body.commits[body.commits.size() - 1].message.matches('!\\\\d+$') ? body.commits[body.commits.size() - 1].message.substring(body.commits[body.commits.size() - 1].message.lastIndexOf('!') + 1) : '' }}"
  pipelineSpec:
    tasks:
      - name: task
        displayName: This is a task
        taskSpec:
          steps:
            - name: task-step
              image: registry.access.redhat.com/ubi9/ubi-micro
              script: |
                echo "$(params.pull_request_number)"
                exit 0
