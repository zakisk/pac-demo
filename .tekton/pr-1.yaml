---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pull-pr-1
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && body.action != "ready_for_review" && target_branch == "main"
spec:
  params:
    - name: branch
      value: |
        {{ body.pull_request.title.endsWith("23806") ? "branch has number" : "branch doesn't have number" }}
  pipelineSpec:
    tasks:
      - name: task
        displayName: This is a task
        taskSpec:
          steps:
            - name: task-step
              image: registry.access.redhat.com/ubi9/ubi-micro
              script: |
                echo "$(params.branch)"
                exit 0
